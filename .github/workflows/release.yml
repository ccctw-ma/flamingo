name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=16 && exit 0
            echo "bun install failed on attempt ${attempt}, retrying..."
            sleep 5
          done
          exit 1

      - name: Verify (typecheck, lint, test)
        run: |
          bun run typecheck
          bun run lint
          bun test

      - name: Build extension
        run: bun scripts/build.ts

      - name: Package extension
        run: |
          cd build
          zip -r ../flamingo-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flamingo-${{ github.ref_name }}.zip
          generate_release_notes: true
