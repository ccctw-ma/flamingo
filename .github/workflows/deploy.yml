name: Package Chrome Extension

on:
  workflow_dispatch:

concurrency:
  group: chrome-extension-package
  cancel-in-progress: false

jobs:
  package:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=16 && exit 0
            echo "bun install failed on attempt ${attempt}, retrying..."
            sleep 5
          done
          exit 1

      - name: Bump manifest patch version (build number)
        run: |
          BASE_VERSION=$(node -p "require('./manifest.json').version.split('.').slice(0,2).join('.')")
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          node -e "const fs=require('fs');const m=require('./manifest.json');m.version='${NEW_VERSION}';fs.writeFileSync('./manifest.json', JSON.stringify(m, null, 4) + '\n');"
          echo "Packaging version ${NEW_VERSION}"

      - name: Verify (typecheck, lint, test)
        run: |
          bun run typecheck
          bun run lint
          bun test

      - name: Build and package extension
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: flamingo-extension-zip
          path: flamingo.zip
          if-no-files-found: error

      - name: Publish to Chrome Web Store
        env:
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          node <<'NODE'
          const required = [
            "CHROME_CLIENT_ID",
            "CHROME_CLIENT_SECRET",
            "CHROME_EXTENSION_ID",
            "CHROME_REFRESH_TOKEN",
          ];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            throw new Error(`Missing Chrome Web Store secrets: ${missing.join(", ")}`);
          }
          NODE

          ACCESS_TOKEN=$(node --input-type=module <<'NODE'
          const response = await fetch("https://accounts.google.com/o/oauth2/token", {
            method: "POST",
            headers: { "content-type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams({
              client_id: process.env.CHROME_CLIENT_ID,
              client_secret: process.env.CHROME_CLIENT_SECRET,
              refresh_token: process.env.CHROME_REFRESH_TOKEN,
              grant_type: "refresh_token",
            }),
          });
          const payload = await response.json();
          if (!response.ok || !payload.access_token) {
            throw new Error(`Failed to refresh Chrome Web Store token: ${JSON.stringify(payload)}`);
          }
          process.stdout.write(payload.access_token);
          NODE
          )

          curl --silent --show-error --fail-with-body \
            --output upload-response.json \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X PUT \
            -T flamingo.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}"

          node <<'NODE'
          const upload = require("./upload-response.json");
          if (upload.uploadState !== "SUCCESS") {
            throw new Error(`Chrome Web Store upload failed: ${JSON.stringify(upload)}`);
          }
          NODE

          curl --silent --show-error --fail-with-body \
            --output publish-response.json \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CHROME_EXTENSION_ID}/publish"

          node <<'NODE'
          const publish = require("./publish-response.json");
          if (!Array.isArray(publish.status) || !publish.status.includes("OK")) {
            throw new Error(`Chrome Web Store publish failed: ${JSON.stringify(publish)}`);
          }
          NODE
