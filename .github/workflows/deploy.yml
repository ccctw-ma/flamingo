name: Deploy to Chrome Web Store

on:
  push:
    branches: [main]

# Avoid overlapping store uploads when several commits land quickly.
concurrency:
  group: chrome-web-store-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Publish to Chrome Web Store
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=16 && exit 0
            echo "bun install failed on attempt ${attempt}, retrying..."
            sleep 5
          done
          exit 1

      - name: Bump manifest patch version (build number)
        run: |
          BASE_VERSION=$(node -p "require('./manifest.json').version.split('.').slice(0,2).join('.')")
          NEW_VERSION="${BASE_VERSION}.${{ github.run_number }}"
          node -e "const fs=require('fs');const m=require('./manifest.json');m.version='${NEW_VERSION}';fs.writeFileSync('./manifest.json', JSON.stringify(m, null, 4) + '\n');"
          echo "Publishing version ${NEW_VERSION}"

      - name: Verify (typecheck, lint, test)
        run: |
          bun run typecheck
          bun run lint
          bun test

      - name: Build extension
        run: bun scripts/build.ts

      - name: Package extension
        run: |
          cd build
          zip -r ../flamingo.zip .

      - name: Upload & publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: flamingo.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
