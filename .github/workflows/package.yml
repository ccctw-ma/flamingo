name: Package Extension Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: package-extension-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build & Upload Zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            bun install --frozen-lockfile --registry=https://registry.npmjs.org --network-concurrency=16 && exit 0
            echo "bun install failed on attempt ${attempt}, retrying..."
            sleep 5
          done
          exit 1

      - name: Verify (typecheck, lint, test)
        run: |
          bun run typecheck
          bun run lint
          bun run test

      - name: Package extension
        run: bun run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: flamingo-extension-zip-${{ github.sha }}
          path: flamingo.zip
          if-no-files-found: error
