<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flamingo</title>
    <style>
      :root {
        --flamingo-popup-width: 800px;
        --flamingo-popup-height: 500px;
      }

      html,
      body,
      #root {
        margin: 0;
        overflow: hidden;
      }

      html[data-flamingo-mode="popup"],
      html[data-flamingo-mode="popup"] body,
      html[data-flamingo-mode="popup"] #root {
        width: var(--flamingo-popup-width);
        height: var(--flamingo-popup-height);
        min-width: var(--flamingo-popup-width);
        min-height: var(--flamingo-popup-height);
      }

      html[data-flamingo-mode="tab"],
      html[data-flamingo-mode="tab"] body,
      html[data-flamingo-mode="tab"] #root {
        width: 100vw;
        height: 100vh;
        min-width: var(--flamingo-popup-width);
        min-height: var(--flamingo-popup-height);
      }
    </style>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const isTab = params.get("mode") === "tab";
        document.documentElement.dataset.flamingoMode = isTab ? "tab" : "popup";
        const WIDTH_KEY = "flamingo:popup-width";
        const HEIGHT_KEY = "flamingo:popup-height";

        const applySize = (width, height) => {
          const safeWidth = Number.isFinite(width)
            ? Math.min(800, Math.max(640, Math.round(width)))
            : 800;
          const safeHeight = Number.isFinite(height)
            ? Math.min(600, Math.max(420, Math.round(height)))
            : 494;
          document.documentElement.style.setProperty("--flamingo-popup-width", `${safeWidth}px`);
          document.documentElement.style.setProperty("--flamingo-popup-height", `${safeHeight}px`);
        };

        const cachedWidth = Number(window.localStorage.getItem(WIDTH_KEY));
        const cachedHeight = Number(window.localStorage.getItem(HEIGHT_KEY));
        applySize(cachedWidth, cachedHeight);

        if (!isTab && window.chrome?.storage?.local?.get) {
          window.chrome.storage.local.get(["HOME_WIDTH", "HOME_HEIGHT"], (result) => {
            applySize(result.HOME_WIDTH, result.HOME_HEIGHT);
            if (Number.isFinite(result.HOME_WIDTH)) {
              window.localStorage.setItem(WIDTH_KEY, String(result.HOME_WIDTH));
            }
            if (Number.isFinite(result.HOME_HEIGHT)) {
              window.localStorage.setItem(HEIGHT_KEY, String(result.HOME_HEIGHT));
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
